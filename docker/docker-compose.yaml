services:

  tempo:
    image: grafana/tempo:2.9.1
    volumes:
      - ./shared/tempo/tempo.yml:/etc/tempo.yml
      - ./tempo-data:/var/tempo
    ports:
      - "3200:3200"
    command: ["-config.file=/etc/tempo.yml"]


  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./shared/prometheus:/etc/prometheus
    ports:
      - "9090:9090"
    command: 
      - "--web.enable-remote-write-receiver" 
      - "--config.file=/etc/prometheus/prometheus.yml"
  
  mimir:
    image: grafana/mimir:latest
    volumes:
      - ./shared/mimir:/etc/mimir
      - ./mimir-data:/var/mimir
    ports:
      - "9009:9009"
    command:
      - "--config.file=/etc/mimir/config.yaml"
    depends_on:
      - prometheus


  loki:
    image: grafana/loki:latest
    volumes:
      - ./shared/loki/chunks:/loki/chunks/
      - ./shared/loki/rules:/loki/rules/
    ports:
      - "3100:3100"
    command:
      - "-config.file=/etc/loki/local-config.yaml"

  log-generator:
      image: python:3.9-slim
      volumes:
        - ./log-gen.py:/app/log-gen.py
        - ./shared/logs:/var/log
      command: python /app/log-gen.py
      
  promtail:
    image: grafana/promtail:latest
    depends_on:
      - loki
    volumes:
      - ./shared/logs:/var/log
      - ./shared/promtail:/etc/promtail
    command:
      - "-config.file=/etc/promtail/config.yml"
  pyroscope:
      image: grafana/pyroscope:latest
      ports:
        - "4040:4040"
      volumes:
        - ./pyroscope-data:/var/lib/pyroscope
        - ./shared/pyroscope/config.yaml:/etc/pyroscope/config.yaml
      command: 
        - "-config.file=/etc/pyroscope/config.yaml"

  alloy:
    image: grafana/alloy:latest
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=public-preview
      - /etc/alloy/config.alloy
    volumes:
      - ./shared/alloy:/etc/alloy
      - ./shared/logs:/var/log
    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo
      - loki
      - prometheus
      - pyroscope

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./shared/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./shared/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./shared/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./shared/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_HTTP_TLS_SKIP_VERIFY=true
    ports:
      - "3000:3000"

  shoehub:
    image: aussiearef/shoehub
    ports:
      - "8001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - LOG_PATH=/app/logs/log.txt
    volumes:
    - ./shared/logs/shoehub:/app/logs:rw
    depends_on:
      - loki
      - prometheus

  orderservice:
    image: aussiearef/orderservice
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - paymentservice
      - alloy

  paymentservice:
    image: aussiearef/paymentservice
    ports:
      - "8082:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - alloy

  stimulator:
    image: aussiearef/stimulator
    depends_on:
      - orderservice
      - paymentservice
      
volumes:
  prometheus-data:
  tempo-data:
  pyroscope-data:
  mimir-data: